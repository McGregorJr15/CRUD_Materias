<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Materias</title>
</head>
<body>
    <h1>Gestión de Materias</h1>
    <a th:href="@{/materias/nueva}">+ Crear Nueva Materia</a>
    <br><br>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Créditos</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="materia : ${materias}">
                <td th:text="${materia.id}"></td>
                <td th:text="${materia.nombre}"></td>
                <td th:text="${materia.creditos}"></td>
                <td>
                    <a th:href="@{/materias/editar/{id}(id=${materia.id})}">Editar</a> |
                    <a th:href="@{/materias/eliminar/{id}(id=${materia.id})}">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
