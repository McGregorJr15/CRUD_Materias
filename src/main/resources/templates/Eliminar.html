<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación</title>
</head>
<body>
    <h1>⚠️ Confirmar Eliminación</h1>
    
    <p>¿Estás seguro de que deseas eliminar la materia: <strong th:text="${materia.nombre}"></strong>?</p>

    <form th:action="@{|/materias/borrar/${materia.id}|}" method="post">
        <button type="submit" style="color: white; background-color: red;">Sí, Eliminar</button>
        <a th:href="@{/materias}" style="margin-left: 10px;">Cancelar</a>
    </form>
</body>
</html>
